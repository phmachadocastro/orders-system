services:
  db:
    image: postgres:15
    container_name: orders_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-orders}
    ports:
      - "${DB_PORT:-55432}:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
