quarkus.datasource.db-kind=${DB_KIND}
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}

worker.confirm-interval=${WORKER_CONFIRM_INTERVAL:60s}
worker.confirm-after-minutes=${WORKER_CONFIRM_AFTER_MINUTES:10}

# Avoid interactive prompt in dev mode.
quarkus.analytics.disabled=true

# Keep dev mode focused on scheduler execution (no continuous test UI loop).
quarkus.test.continuous-testing=disabled
