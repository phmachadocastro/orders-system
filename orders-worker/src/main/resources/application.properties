quarkus.datasource.db-kind=${DB_KIND:postgresql}
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:55432}/${DB_NAME:orders}

# Avoid interactive prompt in dev mode.
quarkus.analytics.disabled=true

# Keep dev mode focused on scheduler execution (no continuous test UI loop).
quarkus.test.continuous-testing=disabled
